name: Biome Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-biome-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Check Biome config alignment
        run: npm run check:biome-config
